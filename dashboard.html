<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>Дашборд ТПА — Цех</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #4caf50;
    --green-bg: rgba(76,175,80,0.15);
    --red: #f44336;
    --red-bg: rgba(244,67,54,0.15);
    --amber: #ff9800;
    --amber-bg: rgba(255,152,0,0.15);
    --blue: #2196f3;
    --blue-bg: rgba(33,150,243,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .header-sub { font-size: 14px; color: var(--text2); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .clock { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .date-str { font-size: 13px; color: var(--text2); text-align: right; }
  .shift-tag {
    padding: 6px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 700;
    background: var(--green-bg); color: var(--green);
    border: 1px solid var(--green);
  }
  .summary {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .summary-item {
    background: var(--surface);
    padding: 12px 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  .summary-val { font-size: 26px; font-weight: 700; }
  .summary-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .section-title {
    font-size: 12px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    padding: 12px 20px 6px;
  }
  .machines-wrap { padding: 0 16px 16px; }
  .machines-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .mcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .mcard.ok    { border-color: rgba(76,175,80,0.4); }
  .mcard.warn  { border-color: rgba(255,152,0,0.4); }
  .mcard.fail  { border-color: rgba(244,67,54,0.5); }
  .mcard.off   { opacity: 0.4; }
  .mcard-header {
    padding: 10px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .mcard-name { font-size: 18px; font-weight: 800; }
  .mcard-type { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .mcard-status {
    font-size: 11px; font-weight: 700; padding: 3px 8px;
    border-radius: 12px; white-space: nowrap;
  }
  .status-ok   { background: var(--green-bg); color: var(--green); }
  .status-warn { background: var(--amber-bg); color: var(--amber); }
  .status-fail { background: var(--red-bg);   color: var(--red); }
  .status-off  { background: var(--surface2); color: var(--text3); }
  .mcard-body { padding: 10px 14px; }
  .big-nums {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 6px; margin-bottom: 10px; text-align: center;
  }
  .big-num-val { font-size: 22px; font-weight: 800; line-height: 1; }
  .big-num-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; }
  .norm-block { margin-bottom: 8px; }
  .norm-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 5px;
  }
  .norm-label { font-size: 11px; color: var(--text2); }
  .norm-pct { font-size: 12px; font-weight: 700; }
  .norm-pct.ok   { color: var(--green); }
  .norm-pct.warn { color: var(--amber); }
  .norm-pct.fail { color: var(--red); }
  .pbar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 2px; }
  .pbar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .pbar-green { background: var(--green); }
  .pbar-amber { background: var(--amber); }
  .pbar-red   { background: var(--red); }
  .mcard-footer {
    padding: 6px 14px 8px;
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--text2);
    border-top: 1px solid var(--border);
  }
  .config-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 12px;
    z-index: 100;
  }
  .config-panel input[type="url"] {
    flex: 1; height: 36px; padding: 0 12px;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px;
  }
  .config-panel input[type="url"]:focus { outline: none; border-color: var(--blue); }
  .config-panel input[type="date"] {
    height: 36px; padding: 0 10px;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--blue); border-radius: 6px;
    font-size: 13px;
  }
  .config-panel select {
    height: 36px; padding: 0 10px;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px;
  }
  .cfg-btn {
    height: 36px; padding: 0 16px;
    background: var(--blue-bg); color: var(--blue);
    border: 1px solid var(--blue); border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .cfg-lbl { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .auto-badge {
    font-size: 11px; color: var(--green);
    background: var(--green-bg); padding: 3px 8px; border-radius: 10px;
    white-space: nowrap;
  }
  .status-bar-bottom {
    padding: 4px 20px 56px;
    font-size: 11px; color: var(--text3);
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">⚙️ Цех ТПА — Дашборд</div>
      <div class="header-sub" id="hdr-sub">Загрузка данных...</div>
    </div>
    <div class="shift-tag" id="shift-tag">—</div>
  </div>
  <div class="header-right">
    <div style="text-align:right">
      <div class="clock" id="clock">--:--</div>
      <div class="date-str" id="date-str">—</div>
    </div>
  </div>
</div>

<div class="summary">
  <div class="summary-item"><div class="summary-val" id="s-total">—</div><div class="summary-lbl">Годные всего</div></div>
  <div class="summary-item"><div class="summary-val" style="color:var(--red)" id="s-defects">—</div><div class="summary-lbl">Брак</div></div>
  <div class="summary-item"><div class="summary-val" id="s-rate">—</div><div class="summary-lbl">% брака</div></div>
  <div class="summary-item"><div class="summary-val" style="color:var(--green)" id="s-norm-pct">—</div><div class="summary-lbl">Выполнение нормы</div></div>
  <div class="summary-item"><div class="summary-val" style="color:var(--amber)" id="s-down">—</div><div class="summary-lbl">Простои (мин)</div></div>
</div>

<div style="padding: 0 16px 8px;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">
        📊 Выпущено vs Норма
      </div>
      <canvas id="chart-output" height="140"></canvas>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;">
      <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">
        ⚡ Эффективность по станкам (%)
      </div>
      <canvas id="chart-eff" height="140"></canvas>
    </div>
  </div>
</div>

<div class="section-title">Литьё под давлением — T1–T9</div>
<div class="machines-wrap"><div class="machines-grid" id="grid-t"></div></div>

<div class="section-title">Выдув — V1–V5</div>
<div class="machines-wrap"><div class="machines-grid" id="grid-v"></div></div>

<div class="status-bar-bottom" id="status-bottom">Ожидание данных...</div>

<div class="config-panel">
  <span class="cfg-lbl">URL:</span>
  <input type="url" id="gs-url" placeholder="https://script.google.com/macros/s/.../exec">
  <span class="cfg-lbl">Дата:</span>
  <select id="dash-date-mode" onchange="toggleDateInput(); renderAll();">
    <option value="last">Последний день</option>
    <option value="today">Сегодня</option>
    <option value="custom">Выбрать дату</option>
    <option value="all">Всё время</option>
  </select>
  <input type="date" id="dash-filter-date" style="display:none;" oninput="renderAll()" onchange="renderAll()">
  <span class="cfg-lbl">Смена:</span>
  <select id="dash-shift" onchange="renderAll()">
    <option value="all">Все смены (22ч)</option>
    <option value="s1">Смена 1 (10ч)</option>
    <option value="s2">Смена 2 (12ч)</option>
  </select>
  <button class="cfg-btn" onclick="saveAndLoad()">🔄 Загрузить</button>
  <span class="auto-badge" id="auto-badge">⏱ 5 мин</span>
</div>

<script>
(function(){var s=JSON.parse(sessionStorage.getItem("tpa_session")||"null");if(!s)window.location.href="login.html";})();

var MACHINES_T = [
  {id:'T1',name:'T1',type:'Hwamda 170'},
  {id:'T2',name:'T2',type:'Hwamda 170'},
  {id:'T3',name:'T3',type:'Airfa 130'},
  {id:'T4',name:'T4',type:'Airfa 130'},
  {id:'T5',name:'T5',type:'Yongjian 160'},
  {id:'T6',name:'T6',type:'Yongjian 160'},
  {id:'T7',name:'T7',type:'Hanplas 130'},
  {id:'T8',name:'T8',type:'Hanplas 170'},
  {id:'T9',name:'T9',type:'Airfa 220'}
];
var MACHINES_V = [
  {id:'V1',name:'V1',type:'Juneng 5L'},
  {id:'V2',name:'V2',type:'Juneng 5L'},
  {id:'V3',name:'V3',type:'Eski kok 5L'},
  {id:'V4',name:'V4',type:'Yashil 2L'},
  {id:'V5',name:'V5',type:'Juneng 5L'}
];
var ALL_MACHINES = MACHINES_T.concat(MACHINES_V);
var records = [];
var nextRefresh = 300;

function loadGsUrl(){ return localStorage.getItem('dash_gs_url') || ''; }
function saveGsUrl(u){ localStorage.setItem('dash_gs_url', u); }

function calcNorm(cycleTime, cavities, shiftNum) {
  if (!cycleTime || cycleTime <= 0 || !cavities) return 0;
  var hours = shiftNum === 1 ? 10 : 12;
  return Math.floor((3600 / cycleTime) * cavities * hours);
}

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  document.getElementById('clock').textContent =
    String(h).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('date-str').textContent =
    now.toLocaleDateString('ru-RU', {weekday:'short', day:'numeric', month:'long'});
  var isS1 = h >= 8 && h < 18;
  var st = document.getElementById('shift-tag');
  st.textContent = isS1 ? '☀️ Смена 1 (08–18)' : '🌙 Смена 2 (18–08)';
  st.style.background = isS1 ? 'rgba(255,152,0,0.15)' : 'rgba(33,150,243,0.15)';
  st.style.color = isS1 ? 'var(--amber)' : 'var(--blue)';
  st.style.borderColor = isS1 ? 'var(--amber)' : 'var(--blue)';
  nextRefresh--;
  if (nextRefresh <= 0) { nextRefresh = 300; fetchData(); }
  document.getElementById('auto-badge').textContent = '⏱ Обновление через: ' + nextRefresh + 'с';
}

function saveAndLoad() {
  var url = document.getElementById('gs-url').value.trim();
  if (url) saveGsUrl(url);
  nextRefresh = 300;
  fetchData();
}

// ✅ ИСПРАВЛЕНО: id=dash-date-mode, значение custom вместо date
function toggleDateInput() {
  var mode = document.getElementById('dash-date-mode').value;
  var dateInput = document.getElementById('dash-filter-date');
  if (mode === 'custom') {
    dateInput.style.display = 'inline-block';
    if (!dateInput.value) dateInput.value = getTodayStr();
  } else {
    dateInput.style.display = 'none';
  }
}

function fetchData() {
  var url = loadGsUrl();
  if (!url) {
    document.getElementById('status-bottom').textContent = '⚠️ Введите URL Apps Script и нажмите «Загрузить»';
    return;
  }
  document.getElementById('status-bottom').textContent = '⏳ Загрузка данных...';
  var cbName = 'dashCb_' + Date.now();
  var script = document.createElement('script');
  var done = false;
  window[cbName] = function(data) {
    done = true;
    delete window[cbName];
    if (document.body.contains(script)) document.body.removeChild(script);
    if (data && data.rows) {
      records = data.rows.map(function(r, i) {
        return {
          id: i,
          date: normalizeDate(r[0]),
          shift: r[1]||'',
          operator: r[2]||'',
          machine: r[3]||'',
          material: r[4]||'',
          partName: r[5]||'',
          moldId: r[6]||'',
          cavities: parseInt(r[7])||1,
          cycles: parseInt(r[8])||0,
          cycleTime: parseFloat(r[9])||0,
          good: parseInt(r[10])||0,
          defects: parseInt(r[11])||0,
          weight: parseFloat(r[13])||0,
          defectNote: r[14]||'',
          plannedDown: parseInt(r[15])||0,
          unplannedDown: parseInt(r[16])||0,
          downtimeReason: r[17]||''
        };
      });
      var now = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      var allDates = records.map(function(r){return r.date;}).filter(Boolean).sort();
      var lastDate = allDates.length ? allDates[allDates.length-1] : '—';
      document.getElementById('status-bottom').textContent = '✅ Загружено: ' + records.length + ' записей · Обновлено: ' + now;
      document.getElementById('hdr-sub').textContent = 'Записей: ' + records.length + ' · Последние данные: ' + lastDate + ' · Обновлено: ' + now;
      renderAll();
    } else {
      document.getElementById('status-bottom').textContent = '⚠️ Нет данных от Google Sheets';
    }
  };
  script.onerror = function() {
    if (!done) { done=true; delete window[cbName]; document.getElementById('status-bottom').textContent = '❌ Ошибка соединения'; }
  };
  setTimeout(function(){
    if(!done){done=true;delete window[cbName];if(document.body.contains(script))document.body.removeChild(script);document.getElementById('status-bottom').textContent='❌ Превышено время ожидания';}
  }, 8000);
  script.src = url + '?action=getLog&callback=' + cbName;
  document.body.appendChild(script);
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function normalizeDate(dateStr) {
  if (!dateStr) return '';
  var s = String(dateStr);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  var m1 = s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m1) return m1[1]+'-'+m1[2]+'-'+m1[3];
  var months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  var m2 = s.match(/[A-Za-z]{3}\s+([A-Za-z]{3})\s+(\d{1,2})\s+(\d{4})/);
  if (m2) return m2[3]+'-'+(months[m2[1]]||'01')+'-'+String(m2[2]).padStart(2,'0');
  return s;
}

// ✅ ИСПРАВЛЕНО: читает dash-date-mode (не dash-period), custom (не date)
function renderAll() {
  var today = getTodayStr();
  var mode = document.getElementById('dash-date-mode').value;
  var shiftFilter = document.getElementById('dash-shift').value;
  var filterDate = document.getElementById('dash-filter-date');

  // Показать/скрыть поле выбора даты
  filterDate.style.display = (mode === 'custom') ? 'inline-block' : 'none';
  if (mode === 'custom' && !filterDate.value) filterDate.value = today;

  // Последняя дата в данных
  var allDates = records.map(function(r){ return r.date; }).filter(Boolean).sort();
  var lastDate = allDates.length ? allDates[allDates.length-1] : today;

  // Фильтр по дате
  var filtered = records.filter(function(r) {
    var rd = r.date;
    if (mode === 'today')  return rd === today;
    if (mode === 'last')   return rd === lastDate;
    if (mode === 'custom') return rd === (filterDate.value || today);
    return true; // 'all'
  });

  // ✅ Фильтр по смене
  if (shiftFilter === 's1') {
    filtered = filtered.filter(function(r){ return r.shift.indexOf('Смена 1') >= 0; });
  } else if (shiftFilter === 's2') {
    filtered = filtered.filter(function(r){ return r.shift.indexOf('Смена 2') >= 0; });
  }

  // Summary
  var totalGood = filtered.reduce(function(s,r){return s+r.good;},0);
  var totalDef  = filtered.reduce(function(s,r){return s+r.defects;},0);
  var totalDown = filtered.reduce(function(s,r){return s+(r.plannedDown||0)+(r.unplannedDown||0);},0);
  var defRate = (totalGood+totalDef) ? Math.round(totalDef/(totalGood+totalDef)*100) : 0;

  var totalNorm = 0, totalProduced = 0;
  ALL_MACHINES.forEach(function(m){
    var ms = getMachineStats(m.id, filtered, shiftFilter);
    if (ms.normDay > 0){ totalNorm += ms.normDay; totalProduced += ms.good; }
  });
  var normPct = totalNorm > 0 ? Math.round(totalProduced/totalNorm*100) : null;

  document.getElementById('s-total').textContent = totalGood.toLocaleString();
  document.getElementById('s-defects').textContent = totalDef.toLocaleString();
  document.getElementById('s-rate').textContent = defRate + '%';
  document.getElementById('s-rate').style.color = defRate===0?'var(--green)':defRate<5?'var(--amber)':'var(--red)';
  document.getElementById('s-norm-pct').textContent = normPct!==null ? normPct+'%' : '—';
  document.getElementById('s-norm-pct').style.color = normPct===null?'var(--text2)':normPct>=100?'var(--green)':normPct>=80?'var(--amber)':'var(--red)';
  document.getElementById('s-down').textContent = totalDown || '0';

  renderGrid('grid-t', MACHINES_T, filtered, shiftFilter);
  renderGrid('grid-v', MACHINES_V, filtered, shiftFilter);
  if (typeof renderCharts === 'function') renderCharts(filtered, shiftFilter);
}

// ✅ normDay зависит от shiftFilter
function getMachineStats(machineId, recs, shiftFilter) {
  var s = {
    good:0, defects:0, cycles:0, plannedDown:0, unplannedDown:0,
    operators:{}, opShifts:{}, parts:[], molds:{},
    s1:{good:0,cycleTime:0,cavities:0,count:0},
    s2:{good:0,cycleTime:0,cavities:0,count:0},
    normDay:0, norm1:0, norm2:0
  };
  recs.forEach(function(r){
    var key = r.machine ? r.machine.split(' ')[0] : '';
    if (key !== machineId) return;
    s.good += r.good||0;
    s.defects += r.defects||0;
    s.cycles += r.cycles||0;
    s.plannedDown += r.plannedDown||0;
    s.unplannedDown += r.unplannedDown||0;
    if (r.partName) s.parts.push(r.partName);
    if (r.moldId || r.partName) {
      var moldKey = (r.moldId||'') + (r.partName ? ' '+r.partName : '');
      s.molds[moldKey] = (s.molds[moldKey]||0) + (r.good||0);
    }
    if (r.operator) {
      s.operators[r.operator] = (s.operators[r.operator]||0)+(r.good||0);
      if (!s.opShifts[r.operator]) s.opShifts[r.operator] = {};
      var sLabel = (r.shift && r.shift.indexOf('Смена 1')>=0) ? 'С1' : 'С2';
      s.opShifts[r.operator][sLabel] = (s.opShifts[r.operator][sLabel]||0)+(r.good||0);
    }
    var isS1 = r.shift && r.shift.indexOf('Смена 1')>=0;
    var sd = isS1 ? s.s1 : s.s2;
    sd.good += r.good||0;
    if (r.cycleTime>0){
      sd.cycleTime = sd.count>0 ? (sd.cycleTime*sd.count+r.cycleTime)/(sd.count+1) : r.cycleTime;
      sd.cavities = r.cavities||1;
      sd.count++;
    }
  });

  var ct  = s.s1.cycleTime>0 ? s.s1.cycleTime : s.s2.cycleTime;
  var cav = s.s1.cycleTime>0 ? s.s1.cavities  : s.s2.cavities;
  s.norm1 = s.s1.cycleTime>0 ? calcNorm(s.s1.cycleTime,s.s1.cavities,1) : (ct>0 ? calcNorm(ct,cav,1) : 0);
  s.norm2 = s.s2.cycleTime>0 ? calcNorm(s.s2.cycleTime,s.s2.cavities,2) : (ct>0 ? calcNorm(ct,cav,2) : 0);

  if (!shiftFilter || shiftFilter === 'all') {
    s.normDay = s.norm1 + s.norm2;
  } else if (shiftFilter === 's1') {
    s.normDay = s.norm1;
  } else if (shiftFilter === 's2') {
    s.normDay = s.norm2;
  }
  return s;
}

function renderGrid(gridId, machines, todayRecs, shiftFilter) {
  var grid = document.getElementById(gridId);
  var html = '';
  machines.forEach(function(m){
    var s = getMachineStats(m.id, todayRecs, shiftFilter);
    var total = s.good + s.defects;
    var defRate = total ? Math.round(s.defects/total*100) : 0;
    var hasData = total > 0;
    var normDay = s.normDay;
    var pctDay = normDay>0 ? Math.round(s.good/normDay*100) : null;

    var cardCls = !hasData ? 'off' : pctDay===null ? (defRate===0?'ok':defRate<5?'warn':'fail') : (pctDay>=100?'ok':pctDay>=80?'warn':'fail');
    var statusText = !hasData ? 'Нет данных' : pctDay!==null ? (pctDay>=100?'✅ Норма':'⚠️ '+pctDay+'%') : (defRate===0?'✅ Норма':defRate<5?'⚠️ Внимание':'❌ Брак');
    var statusCls = !hasData?'status-off':cardCls==='ok'?'status-ok':cardCls==='warn'?'status-warn':'status-fail';

    var topOp = Object.keys(s.operators).length ?
      Object.keys(s.operators).sort(function(a,b){return s.operators[b]-s.operators[a];})
        .map(function(op){
          var shifts = s.opShifts && s.opShifts[op] ? Object.keys(s.opShifts[op]).join('+') : '';
          return op+(shifts?' ('+shifts+')':'')+' '+s.operators[op].toLocaleString()+'шт';
        }).join(' / ') : '—';

    function pBar(good, norm, label) {
      if (!norm) return '';
      var p = Math.round(good/norm*100);
      var pct = Math.min(p, 100);
      var cls = p>=100?'pbar-green':p>=80?'pbar-amber':'pbar-red';
      var pctCls = p>=100?'ok':p>=80?'warn':'fail';
      return '<div class="norm-row"><span class="norm-label">' + label + '</span><span class="norm-pct '+pctCls+'">' + p + '%</span></div>' +
             '<div class="pbar"><div class="pbar-fill '+cls+'" style="width:'+pct+'%"></div></div>';
    }

    var normBars = '';
    if (hasData && normDay > 0) {
      if (!shiftFilter || shiftFilter === 'all') {
        if (s.s1.count>0) normBars += pBar(s.s1.good, normDay, '☀️ С1');
        if (s.s2.count>0) normBars += pBar(s.s2.good, normDay, '🌙 С2');
        normBars += pBar(s.good, normDay, '📅 Сутки');
      } else if (shiftFilter === 's1') {
        normBars += pBar(s.good, normDay, '☀️ Смена 1');
      } else if (shiftFilter === 's2') {
        normBars += pBar(s.good, normDay, '🌙 Смена 2');
      }
    } else if (hasData) {
      normBars = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:4px 0">Норма: нет данных о цикле</div>';
    }

    html += '<div class="mcard ' + cardCls + '">' +
      '<div class="mcard-header">' +
        '<div><div class="mcard-name">' + m.name + '</div><div class="mcard-type">' + m.type + '</div></div>' +
        '<div class="mcard-status ' + statusCls + '">' + statusText + '</div>' +
      '</div>' +
      '<div class="mcard-body">' +
        '<div class="big-nums">' +
          '<div><div class="big-num-val" style="color:var(--green)">' + (hasData?s.good.toLocaleString():'—') + '</div><div class="big-num-lbl">Годные</div></div>' +
          '<div><div class="big-num-val" style="color:var(--red)">'   + (hasData?s.defects:'—') + '</div><div class="big-num-lbl">Брак</div></div>' +
          '<div><div class="big-num-val">' + (hasData?defRate+'%':'—') + '</div><div class="big-num-lbl">% брак</div></div>' +
        '</div>' +
        (normBars ? '<div class="norm-block">' + normBars + '</div>' : '') +
      '</div>' +
      '<div class="mcard-footer">' +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">👷 ' + topOp + '</span>' +
        '<span>' + (s.cycles?s.cycles+' цикл':'—') + '</span>' +
        (s.unplannedDown ? '<span style="color:var(--red)">⏸ '+s.unplannedDown+'м</span>' : '') +
      '</div>' +
      (hasData && Object.keys(s.molds).length ?
        '<div style="border-top:1px solid rgba(255,255,255,0.08);padding:8px 14px">' +
        '<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Пресс-формы</div>' +
        Object.keys(s.molds).sort(function(a,b){return s.molds[b]-s.molds[a];}).map(function(mold){
          var pct = s.good>0?Math.round(s.molds[mold]/s.good*100):0;
          return '<div style="display:flex;justify-content:space-between;margin-bottom:3px">' +
            '<span style="font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">' + mold + '</span>' +
            '<span style="font-size:11px;font-weight:700;color:#fff;white-space:nowrap">' + s.molds[mold].toLocaleString() + ' <span style="color:#555;font-weight:400">'+pct+'%</span></span>' +
          '</div>';
        }).join('') + '</div>'
      : '') +
    '</div>';
  });
  grid.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function(){
  var saved = loadGsUrl();
  if (saved) document.getElementById('gs-url').value = saved;
  updateClock();
  setInterval(updateClock, 1000);
  if (saved) fetchData();
  else document.getElementById('status-bottom').textContent = '⚠️ Введите URL Apps Script внизу и нажмите «Загрузить»';
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
(function(){var s=JSON.parse(sessionStorage.getItem("tpa_session")||"null");if(!s)window.location.href="login.html";})();
var chartOutput = null;
var chartEff = null;

function renderCharts(todayRecs, shiftFilter) {
  var labels = [], produced = [], norms = [], effData = [], effColors = [];
  ALL_MACHINES.forEach(function(m) {
    var s = getMachineStats(m.id, todayRecs, shiftFilter);
    var pct = s.normDay > 0 ? Math.round(s.good / s.normDay * 100) : 0;
    labels.push(m.name);
    produced.push(s.good);
    norms.push(s.normDay);
    effData.push(pct);
    effColors.push(pct >= 100 ? 'rgba(76,175,80,0.85)' : pct >= 80 ? 'rgba(255,152,0,0.85)' : pct > 0 ? 'rgba(244,67,54,0.85)' : 'rgba(80,80,80,0.4)');
  });
  var gridColor = 'rgba(255,255,255,0.06)';
  var tickColor = '#666';
  var font = { family: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", size: 11 };

  if (chartOutput) chartOutput.destroy();
  chartOutput = new Chart(document.getElementById('chart-output'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: 'Выпущено', data: produced, backgroundColor: 'rgba(33,150,243,0.75)', borderRadius: 4, order: 1 },
        { label: 'Норма', data: norms, type: 'line', borderColor: 'rgba(255,152,0,0.9)', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 3, pointBackgroundColor: 'rgba(255,152,0,1)', tension: 0.1, order: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { labels: { color: tickColor, font: font, boxWidth: 12 } } },
      scales: {
        x: { ticks: { color: tickColor, font: font }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, font: font }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });

  if (chartEff) chartEff.destroy();
  chartEff = new Chart(document.getElementById('chart-eff'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ label: 'Эффективность %', data: effData, backgroundColor: effColors, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(ctx) { return ctx.parsed.y + '%'; } } }
      },
      scales: {
        x: { ticks: { color: tickColor, font: font }, grid: { color: gridColor } },
        y: { ticks: { color: tickColor, font: font, callback: function(v){ return v+'%'; } }, grid: { color: gridColor }, beginAtZero: true, max: 120 }
      }
    }
  });
}
</script>
